<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>近くの図書館を探す</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    :root {
      --primary: #1a6aad;
      --primary-light: #e8f2fc;
      --primary-dark: #134f85;
      --accent: #e85d04;
      --surface: #ffffff;
      --surface-2: #f7f8fa;
      --border: #e2e5ea;
      --text: #1a1d23;
      --text-muted: #6b7280;
      --success: #059669;
      --warning: #d97706;
      --danger: #dc2626;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans JP', sans-serif;
      background: var(--surface-2);
      color: var(--text);
      min-height: 100svh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-title { display: flex; align-items: center; gap: 10px; }
    .header-title svg { opacity: 0.9; flex-shrink: 0; }
    .header-title h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; }
    .header-title p { font-size: 0.75rem; opacity: 0.8; margin-top: 1px; }

    .btn-icon {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .btn-icon:hover { background: rgba(255,255,255,0.25); }

    /* ── Controls ── */
    #controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .controls-row-2 {
      gap: 8px;
    }

    .controls-or {
      font-size: 0.78rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .address-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 200px;
    }

    .address-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      outline: none;
    }
    .address-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,106,173,0.1); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, opacity 0.2s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--primary);
    }
    .btn-outline:hover:not(:disabled) { background: var(--primary-light); }

    .btn-ghost {
      background: var(--surface-2);
      color: var(--text);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background: var(--border); }

    #location-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
      padding: 6px 10px;
      background: var(--surface-2);
      border-radius: 20px;
      border: 1px solid var(--border);
    }
    #location-chip.active { color: var(--success); border-color: #a7f3d0; background: #f0fdf4; }
    #location-chip.error { color: var(--danger); border-color: #fecaca; background: #fff5f5; }

    .limit-select {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-size: 0.875rem;
      color: var(--text);
      cursor: pointer;
    }

    /* ── Main View ── */
    #main-view {
      display: grid;
      grid-template-columns: 1fr 380px;
      flex: 1;
      min-height: 0;
      height: calc(100svh - 130px);
    }

    #map {
      z-index: 1;
      background: #e8edf2;
    }

    #library-list {
      overflow-y: auto;
      background: var(--surface);
      border-left: 1px solid var(--border);
    }

    .list-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 2;
    }

    .list-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      gap: 12px;
      color: var(--text-muted);
      text-align: center;
    }
    .list-empty svg { opacity: 0.3; }
    .list-empty p { font-size: 0.875rem; line-height: 1.5; }

    /* Library Cards */
    .library-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .library-card:hover { background: var(--surface-2); }
    .library-card.highlighted { background: var(--primary-light); border-left: 3px solid var(--primary); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
    }

    .card-name {
      font-size: 0.9375rem;
      font-weight: 700;
      color: var(--primary);
      text-decoration: none;
      line-height: 1.3;
    }
    .card-name:hover { text-decoration: underline; }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-public { background: #dbeafe; color: #1d4ed8; }
    .badge-univ { background: #ede9fe; color: #6d28d9; }
    .badge-special { background: #fef3c7; color: #92400e; }
    .badge-national { background: #fee2e2; color: #991b1b; }
    .badge-bm { background: #d1fae5; color: #065f46; }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .distance-chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-weight: 600;
      color: var(--primary);
      font-size: 0.8rem;
    }

    .card-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 2px;
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 0.78rem;
      gap: 4px;
    }

    /* Skeleton */
    .skeleton-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .skeleton-line {
      background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 4px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Book Panel ── */
    #book-panel {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 380px;
      max-height: 60vh;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-left: 1px solid var(--border);
      border-radius: 16px 0 0 0;
      box-shadow: var(--shadow-lg);
      display: flex;
      flex-direction: column;
      z-index: 500;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #book-panel.open { transform: translateY(0); }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .panel-header h3 { font-size: 0.9375rem; font-weight: 700; }
    .panel-subtext { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

    .panel-body { overflow-y: auto; flex: 1; padding: 14px 16px; }

    .isbn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .isbn-row input {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      outline: none;
    }
    .isbn-row input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,106,173,0.1); }

    .availability-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .availability-item:last-child { border-bottom: none; }
    .avail-lib { font-size: 0.84rem; font-weight: 600; }
    .avail-status {
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .status-ok { background: #d1fae5; color: #065f46; }
    .status-loan { background: #fee2e2; color: #991b1b; }
    .status-reserve { background: #fef3c7; color: #92400e; }
    .status-none { background: #f3f4f6; color: #6b7280; }
    .status-unknown { background: #ede9fe; color: #6d28d9; }

    .polling-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.84rem;
      color: var(--text-muted);
      padding: 12px 0;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Settings Panel ── */
    #settings-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #settings-overlay.open { display: flex; }

    #settings-panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: min(440px, 90vw);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .settings-title {
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-field label {
      display: block;
      font-size: 0.84rem;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-muted);
    }
    .settings-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      outline: none;
    }
    .settings-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,106,173,0.1); }
    .settings-hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.5;
    }
    .settings-hint a { color: var(--primary); }

    .settings-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 3000;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      max-width: 90vw;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.error { background: var(--danger); }

    /* ── Map pin ── */
    .map-pin {
      width: 24px;
      height: 24px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid rgba(255,255,255,0.8);
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #main-view {
        grid-template-columns: 1fr;
        grid-template-rows: 260px 1fr;
        height: auto;
        flex: 1;
      }
      #library-list {
        border-left: none;
        border-top: 1px solid var(--border);
      }
      #book-panel {
        width: 100%;
        border-radius: 16px 16px 0 0;
        border-left: none;
        max-height: 70vh;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-title">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <div>
        <h1>近くの図書館を探す</h1>
        <p>Powered by カーリル</p>
      </div>
    </div>
    <button class="btn-icon" id="settings-btn" title="設定" aria-label="設定">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Controls -->
  <div id="controls">
    <div class="controls-row">
      <button class="btn btn-outline" id="locate-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
        現在地を取得
      </button>

      <span class="controls-or">または</span>

      <div class="address-row">
        <input type="text" id="address-input" placeholder="住所・地名で検索（例: 渋谷区、大阪城）" autocomplete="off" />
        <button class="btn btn-outline btn-sm" id="address-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          地名検索
        </button>
      </div>
    </div>

    <div class="controls-row controls-row-2">
      <div id="location-chip">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <span id="location-text">位置情報未取得</span>
      </div>

      <select class="limit-select" id="limit-select">
        <option value="5">5件</option>
        <option value="10" selected>10件</option>
        <option value="20">20件</option>
      </select>

      <button class="btn btn-primary" id="search-btn" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        図書館を検索
      </button>
    </div>
  </div>

  <!-- Main View -->
  <div id="main-view">
    <div id="map"></div>

    <div id="library-list">
      <div class="list-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
        <p>現在地を取得して<br>近くの図書館を検索してください</p>
      </div>
    </div>
  </div>

  <!-- Book Panel -->
  <div id="book-panel" role="dialog" aria-label="蔵書確認">
    <div class="panel-header">
      <div>
        <h3 id="book-panel-title">蔵書を確認</h3>
        <div class="panel-subtext" id="book-panel-lib"></div>
      </div>
      <button class="btn-icon" id="book-panel-close" style="background: var(--surface-2); color: var(--text-muted);" aria-label="閉じる">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="panel-body">
      <div class="isbn-row">
        <input type="text" id="isbn-input" placeholder="ISBN（13桁または10桁）" maxlength="17" inputmode="numeric" />
        <button class="btn btn-primary btn-sm" id="isbn-search-btn">確認</button>
      </div>
      <div id="book-results"></div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div id="settings-overlay" role="dialog" aria-label="設定">
    <div id="settings-panel">
      <div class="settings-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        設定
      </div>

      <div class="settings-field">
        <label for="apikey-input">CALIL APIキー</label>
        <input type="password" id="apikey-input" placeholder="APIキーを入力..." autocomplete="off" />
        <p class="settings-hint">
          APIキーは <a href="https://calil.jp/for_developer/" target="_blank" rel="noopener">カーリル開発者ページ</a> で取得できます。<br>
          入力したキーはこのブラウザのみに保存されます。
        </p>
      </div>

      <div class="settings-actions">
        <button class="btn btn-ghost" id="settings-close">キャンセル</button>
        <button class="btn btn-primary" id="settings-save">保存</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" role="alert" aria-live="polite"></div>

  <script>
  (() => {
    'use strict';

    // ── Constants ──
    const LIBRARY_URL = 'https://api.calil.jp/library';
    const CHECK_URL   = 'https://api.calil.jp/check';
    const STORAGE_KEY = 'calil_appkey';
    const MAX_POLL    = 12;

    const LIB_TYPES = {
      '1': { label: '一般',       cls: 'badge-public'   },
      '2': { label: '大学図書館', cls: 'badge-univ'     },
      '3': { label: '専門図書館', cls: 'badge-special'  },
      '4': { label: '国立図書館', cls: 'badge-national' },
      '5': { label: '移動図書館', cls: 'badge-bm'       },
    };

    // ── State ──
    const state = {
      lat: null,
      lng: null,
      libraries: [],
      markers: [],
      map: null,
      markerLayer: null,
      currentSystemId: null,
      polling: false,
    };

    // ── Utils ──
    let _sessionKey = '';
    function getApiKey() {
      try { return localStorage.getItem(STORAGE_KEY) || _sessionKey; }
      catch { return _sessionKey; }
    }
    function saveApiKey(k) {
      _sessionKey = k;
      try { localStorage.setItem(STORAGE_KEY, k); } catch {}
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

    function formatDistance(km) {
      const n = parseFloat(km);
      if (isNaN(n)) return '—';
      return n < 1 ? `${Math.round(n * 1000)} m` : `${n.toFixed(1)} km`;
    }

    function normalizeIsbn(raw) {
      return raw.replace(/[-\s]/g, '');
    }
    function isValidIsbn(s) {
      return /^\d{10}$/.test(s) || /^\d{13}$/.test(s);
    }

    let _toastTimer = null;
    function showToast(msg, type = 'info') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = type === 'error' ? 'error show' : 'show';
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => { el.className = el.className.replace(' show', '').replace('show', ''); }, 3500);
    }

    // ── JSONP ──
    function jsonp(url, params, timeoutMs = 10000) {
      return new Promise((resolve, reject) => {
        const cbName = '__calil_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        params.callback = cbName;
        params.format = 'json';
        const qs = new URLSearchParams(params).toString();
        const script = document.createElement('script');
        script.src = url + '?' + qs;

        let done = false;
        const timer = setTimeout(() => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('APIのレスポンスがタイムアウトしました'));
        }, timeoutMs);

        window[cbName] = (data) => {
          if (done) return;
          done = true;
          cleanup();
          resolve(data);
        };

        function cleanup() {
          clearTimeout(timer);
          delete window[cbName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        script.onerror = () => {
          if (done) return;
          done = true;
          cleanup();
          reject(new Error('ネットワークエラーが発生しました'));
        };

        document.head.appendChild(script);
      });
    }

    // ── Settings Panel ──
    const settingsOverlay = document.getElementById('settings-overlay');
    const apikeyInput     = document.getElementById('apikey-input');

    document.getElementById('settings-btn').addEventListener('click', () => {
      apikeyInput.value = getApiKey();
      settingsOverlay.classList.add('open');
      apikeyInput.focus();
    });
    document.getElementById('settings-close').addEventListener('click', closeSettings);
    settingsOverlay.addEventListener('click', (e) => { if (e.target === settingsOverlay) closeSettings(); });

    document.getElementById('settings-save').addEventListener('click', () => {
      const key = apikeyInput.value.trim();
      if (!key) { showToast('APIキーを入力してください', 'error'); return; }
      saveApiKey(key);
      closeSettings();
      showToast('APIキーを保存しました');
    });

    function closeSettings() {
      settingsOverlay.classList.remove('open');
    }

    // ── Geolocation & Address Search ──
    const locateBtn    = document.getElementById('locate-btn');
    const locationChip = document.getElementById('location-chip');
    const locationText = document.getElementById('location-text');
    const searchBtn    = document.getElementById('search-btn');
    const addressInput = document.getElementById('address-input');
    const addressBtn   = document.getElementById('address-btn');

    locateBtn.addEventListener('click', locateUser);
    addressBtn.addEventListener('click', geocodeAddress);
    addressInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') geocodeAddress(); });

    async function geocodeAddress() {
      const q = addressInput.value.trim();
      if (!q) { showToast('地名または住所を入力してください', 'error'); return; }

      addressBtn.disabled = true;
      addressBtn.innerHTML = `<div class="spinner" style="width:12px;height:12px;border-width:2px;"></div>`;

      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&accept-language=ja`,
          { headers: { 'Accept': 'application/json' } }
        );
        const data = await res.json();
        if (!data || data.length === 0) {
          showToast('場所が見つかりませんでした', 'error');
          return;
        }
        state.lat = parseFloat(data[0].lat);
        state.lng = parseFloat(data[0].lon);
        const displayName = data[0].display_name.split(',')[0];
        locationChip.className = 'active';
        locationText.textContent = displayName;
        searchBtn.disabled = false;
        initMap();
      } catch (err) {
        showToast('住所検索に失敗しました', 'error');
      } finally {
        addressBtn.disabled = false;
        addressBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> 地名検索`;
      }
    }

    function locateUser() {
      if (!navigator.geolocation) {
        showToast('このブラウザは位置情報に対応していません', 'error');
        return;
      }
      locateBtn.disabled = true;
      locateBtn.innerHTML = `<div class="spinner" style="width:14px;height:14px;border-width:2px;"></div> 取得中…`;
      locationChip.className = 'location-chip';
      locationText.textContent = '取得中...';

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          state.lat = pos.coords.latitude;
          state.lng = pos.coords.longitude;
          locationChip.className = 'active';
          locationText.textContent = `${state.lat.toFixed(4)}, ${state.lng.toFixed(4)}`;
          locateBtn.disabled = false;
          locateBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg> 現在地を再取得`;
          searchBtn.disabled = false;
          initMap();
        },
        (err) => {
          const msgs = {
            1: '位置情報へのアクセスが拒否されました',
            2: '位置情報を取得できませんでした',
            3: '位置情報の取得がタイムアウトしました',
          };
          showToast(msgs[err.code] || '位置情報の取得に失敗しました', 'error');
          locationChip.className = 'error';
          locationText.textContent = 'エラー';
          locateBtn.disabled = false;
          locateBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg> 現在地を取得`;
        },
        { timeout: 12000, maximumAge: 60000, enableHighAccuracy: false }
      );
    }

    // ── Map ──
    function initMap() {
      if (state.map) {
        state.map.setView([state.lat, state.lng], 14);
        return;
      }
      state.map = L.map('map').setView([state.lat, state.lng], 14);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
        maxZoom: 19,
      }).addTo(state.map);
      state.markerLayer = L.layerGroup().addTo(state.map);

      L.circleMarker([state.lat, state.lng], {
        radius: 9,
        fillColor: '#1a6aad',
        color: '#fff',
        weight: 3,
        fillOpacity: 1,
      }).addTo(state.map).bindPopup('<strong>現在地</strong>');
    }

    function renderMapMarkers(libraries) {
      state.markerLayer.clearLayers();
      state.markers = [];

      const bounds = [[state.lat, state.lng]];

      libraries.forEach((lib, i) => {
        if (!lib.geocode) return;
        const parts = lib.geocode.split(',');
        const lngL = parseFloat(parts[0]);
        const latL = parseFloat(parts[1]);
        if (isNaN(latL) || isNaN(lngL)) return;

        bounds.push([latL, lngL]);

        const type = LIB_TYPES[lib.libtype] || { label: '図書館', cls: 'badge-public' };
        const colors = { 'badge-public': '#1a6aad', 'badge-univ': '#6d28d9', 'badge-special': '#d97706', 'badge-national': '#dc2626', 'badge-bm': '#059669' };
        const color = colors[type.cls] || '#1a6aad';

        const icon = L.divIcon({
          className: '',
          html: `<div class="map-pin" style="background:${color}"></div>`,
          iconSize: [24, 24],
          iconAnchor: [12, 24],
          popupAnchor: [0, -26],
        });

        const popupHtml = `
          <div style="min-width:160px">
            <div style="font-weight:700;margin-bottom:4px;">
              <a href="https://calil.jp/library/${lib.libid}/${encodeURIComponent(lib.formal || lib.short || '')}" target="_blank" rel="noopener" style="color:#1a6aad;text-decoration:none;">
                ${escHtml(lib.short || lib.formal || '図書館')}
              </a>
            </div>
            <div style="font-size:0.78rem;color:#6b7280;">${escHtml(lib.address || '')}</div>
            <div style="font-size:0.78rem;margin-top:4px;color:#1a6aad;font-weight:600;">${formatDistance(lib.distance)}</div>
          </div>`;

        const marker = L.marker([latL, lngL], { icon })
          .bindPopup(popupHtml)
          .addTo(state.markerLayer);

        marker.on('click', () => highlightCard(i));
        state.markers[i] = marker;
      });

      if (bounds.length > 1) {
        state.map.fitBounds(bounds, { padding: [40, 40], maxZoom: 15 });
      }
    }

    function highlightCard(index) {
      document.querySelectorAll('.library-card').forEach((c, i) => {
        c.classList.toggle('highlighted', i === index);
      });
      const card = document.querySelector(`.library-card[data-index="${index}"]`);
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    // ── Library Search ──
    document.getElementById('search-btn').addEventListener('click', searchLibraries);

    async function searchLibraries() {
      const appkey = getApiKey();
      if (!appkey) {
        showToast('設定からAPIキーを入力してください', 'error');
        settingsOverlay.classList.add('open');
        return;
      }
      if (state.lat === null) {
        showToast('先に現在地を取得してください', 'error');
        return;
      }

      const limit = document.getElementById('limit-select').value;
      searchBtn.disabled = true;
      searchBtn.innerHTML = `<div class="spinner" style="width:14px;height:14px;border-width:2px;"></div> 検索中…`;

      showSkeletonCards(parseInt(limit));

      try {
        const data = await jsonp(LIBRARY_URL, {
          appkey,
          geocode: `${state.lat},${state.lng}`,
          limit,
        });

        const libraries = Array.isArray(data) ? data : [];
        state.libraries = libraries;

        if (libraries.length === 0) {
          renderEmptyList('この周辺に図書館が見つかりませんでした');
        } else {
          renderLibraryList(libraries);
          renderMapMarkers(libraries);
        }
      } catch (err) {
        showToast(err.message, 'error');
        renderEmptyList('検索に失敗しました');
      } finally {
        searchBtn.disabled = false;
        searchBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg> 検索`;
      }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function renderLibraryList(libraries) {
      const list = document.getElementById('library-list');
      list.innerHTML = `<div class="list-header">図書館 ${libraries.length}件</div>`;

      libraries.forEach((lib, i) => {
        const type = LIB_TYPES[lib.libtype] || { label: '図書館', cls: 'badge-public' };
        const card = document.createElement('div');
        card.className = 'library-card';
        card.dataset.index = i;

        card.innerHTML = `
          <div class="card-top">
            <a class="card-name"
               href="https://calil.jp/library/${lib.libid}/${encodeURIComponent(lib.formal || lib.short || '')}"
               target="_blank" rel="noopener"
               onclick="event.stopPropagation()">
              ${escHtml(lib.short || lib.formal || '図書館')}
            </a>
            <span class="badge ${type.cls}">${type.label}</span>
          </div>
          <div class="card-meta">
            <span class="distance-chip">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
              ${formatDistance(lib.distance)}
            </span>
            <span>${escHtml(lib.address || '')}</span>
          </div>
          ${lib.tel ? `<div class="card-meta"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg> ${escHtml(lib.tel)}</div>` : ''}
          <div class="card-actions">
            <button class="btn btn-ghost btn-sm check-btn" data-index="${i}">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
              蔵書を確認
            </button>
          </div>`;

        card.addEventListener('click', (e) => {
          if (e.target.closest('.check-btn, a')) return;
          if (state.markers[i]) {
            state.markers[i].openPopup();
            if (state.map) state.map.panTo(state.markers[i].getLatLng());
          }
          document.querySelectorAll('.library-card').forEach((c, j) => c.classList.toggle('highlighted', j === i));
        });

        list.appendChild(card);
      });

      list.querySelectorAll('.check-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const i = parseInt(btn.dataset.index);
          openBookPanel(state.libraries[i]);
        });
      });
    }

    function renderEmptyList(msg) {
      document.getElementById('library-list').innerHTML = `
        <div class="list-empty">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          <p>${escHtml(msg)}</p>
        </div>`;
    }

    function showSkeletonCards(count) {
      const list = document.getElementById('library-list');
      list.innerHTML = `<div class="list-header">検索中...</div>` +
        Array.from({ length: count }, () => `
          <div class="skeleton-card">
            <div style="display:flex;gap:8px;align-items:center;">
              <div class="skeleton-line" style="height:18px;flex:1;"></div>
              <div class="skeleton-line" style="height:18px;width:52px;"></div>
            </div>
            <div class="skeleton-line" style="height:13px;width:70%;"></div>
            <div class="skeleton-line" style="height:13px;width:50%;"></div>
          </div>`).join('');
    }

    // ── Book Panel ──
    const bookPanel = document.getElementById('book-panel');
    document.getElementById('book-panel-close').addEventListener('click', closeBookPanel);
    document.getElementById('isbn-search-btn').addEventListener('click', startIsbnCheck);
    document.getElementById('isbn-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startIsbnCheck();
    });

    function openBookPanel(lib) {
      state.currentSystemId = lib.systemid || lib.libid;
      document.getElementById('book-panel-title').textContent = '蔵書を確認';
      document.getElementById('book-panel-lib').textContent = lib.short || lib.formal || '';
      document.getElementById('isbn-input').value = '';
      document.getElementById('book-results').innerHTML = '';
      bookPanel.classList.add('open');
      document.getElementById('isbn-input').focus();
    }

    function closeBookPanel() {
      bookPanel.classList.remove('open');
      state.polling = false;
    }

    async function startIsbnCheck() {
      if (state.polling) return;

      const raw = document.getElementById('isbn-input').value.trim();
      const isbn = normalizeIsbn(raw);

      if (!isbn) { showToast('ISBNを入力してください', 'error'); return; }
      if (!isValidIsbn(isbn)) { showToast('ISBNの形式が正しくありません（10桁または13桁）', 'error'); return; }

      const appkey = getApiKey();
      if (!appkey) { showToast('設定からAPIキーを入力してください', 'error'); return; }

      const systemid = state.currentSystemId;
      if (!systemid) return;

      state.polling = true;
      const results = document.getElementById('book-results');
      results.innerHTML = `<div class="polling-indicator"><div class="spinner"></div> 蔵書を確認中...</div>`;

      try {
        let res = await jsonp(CHECK_URL, { appkey, isbn, systemid });
        let pollCount = 0;

        while (res.continue === 1 && pollCount < MAX_POLL) {
          await delay(2000);
          if (!state.polling) return;
          res = await jsonp(CHECK_URL, { appkey, session: res.session });
          pollCount++;
        }

        renderAvailability(res.books, isbn);
      } catch (err) {
        results.innerHTML = `<div class="polling-indicator" style="color:var(--danger);">${escHtml(err.message)}</div>`;
        showToast(err.message, 'error');
      } finally {
        state.polling = false;
      }
    }

    function getStatusClass(status) {
      if (!status) return 'status-unknown';
      if (status === '貸出可' || status === '蔵書あり') return 'status-ok';
      if (status === '貸出中') return 'status-loan';
      if (status.includes('予約')) return 'status-reserve';
      if (status === '蔵書なし') return 'status-none';
      return 'status-unknown';
    }

    function renderAvailability(books, isbn) {
      const results = document.getElementById('book-results');
      if (!books || typeof books !== 'object') {
        results.innerHTML = `<div class="polling-indicator">蔵書情報が取得できませんでした</div>`;
        return;
      }

      const isbnKey = Object.keys(books)[0];
      if (!isbnKey) {
        results.innerHTML = `<div class="polling-indicator">蔵書情報が取得できませんでした</div>`;
        return;
      }

      const bookData = books[isbnKey];
      if (!bookData || typeof bookData !== 'object') {
        results.innerHTML = `<div class="polling-indicator">蔵書情報が取得できませんでした</div>`;
        return;
      }

      const items = Object.entries(bookData).map(([sysid, info]) => {
        let status = '不明';
        if (info && info.libkey) {
          const statuses = Object.values(info.libkey);
          status = statuses[0] || '不明';
        }
        return { sysid, status };
      });

      if (items.length === 0) {
        results.innerHTML = `<div class="polling-indicator">蔵書情報が取得できませんでした</div>`;
        return;
      }

      const calilLink = `https://calil.jp/book/${isbn.length === 13 ? isbn.slice(3, 12) : isbn}`;

      results.innerHTML = items.map(({ sysid, status }) => `
        <div class="availability-item">
          <div class="avail-lib">
            <a href="${calilLink}" target="_blank" rel="noopener" style="color:var(--primary);font-size:0.78rem;">${escHtml(sysid)}</a>
          </div>
          <span class="avail-status ${getStatusClass(status)}">${escHtml(status)}</span>
        </div>`).join('');
    }

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeBookPanel();
        closeSettings();
      }
    });

    // ── Init ──
    (() => {
      const key = getApiKey();
      if (!key) {
        apikeyInput.value = '';
        settingsOverlay.classList.add('open');
      }
    })();

  })();
  </script>
</body>
</html>
